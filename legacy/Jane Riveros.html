<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jane Riveros — Built Without a Blueprint</title>
  <meta name="description" content="Enterprise transformation executive turned agentic-AI builder. AI agents with the controls baked in — governance, audit trails, compliance." />

  <!-- Fonts: Space Grotesk (editorial display) + IBM Plex Sans (body) + IBM Plex Mono (system layer) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN. In the Cursor handoff these tokens live in tailwind.config.ts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // near-black / charcoal base + layered surfaces
            ink:    { DEFAULT: "#08090B", 900: "#0A0C0F", 800: "#0E1115", 700: "#13171C", 600: "#191E24" },
            line:   "rgba(255,255,255,0.08)",
            // type
            fg:     { DEFAULT: "#EBEEF2", muted: "#9BA3AD", dim: "#5B6470", faint: "#3A4048" },
            // ONE signal accent — electric cyan
            signal: { DEFAULT: "#FFC24A", deep: "#EBA52E", dim: "#7A5A1E" },
            // ONE warm secondary — amber, live/active states ONLY
            live:   { DEFAULT: "#FFC24A", deep: "#C9821C" },
          },
          fontFamily: {
            display: ['"Playfair Display"', "Georgia", "serif"],
            sans:    ['"IBM Plex Sans"', "system-ui", "sans-serif"],
            mono:    ['"IBM Plex Mono"', "ui-monospace", "monospace"],
          },
          fontWeight: { "400": "400", "500": "500", "600": "600", "700": "700" },
          letterSpacing: { mono: "0.14em" },
          maxWidth: { shell: "1180px" },
        },
      },
    };
  </script>

  <style>
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; overflow-x: clip; }
    body {
      background: #08090B;
      color: #EBEEF2;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: #FFC24A; color: #08090B; }

    /* faint instrument grid behind the whole page */
    .bg-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #08090B; }
    ::-webkit-scrollbar-thumb { background: #191E24; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #2A323A; }

    /* ---------- keyframes (system motion) ---------- */
    @keyframes pulse-ring {
      0%   { transform: scale(0.9); opacity: 0.7; }
      70%  { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes dash-flow { to { stroke-dashoffset: -1000; } }
    @keyframes pipe-flow { from { background-position: 0 0; } to { background-position: 28px 0; } }
    @keyframes pipe-flow-v { from { background-position: 0 0; } to { background-position: 0 28px; } }
    @keyframes scanline { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
    @keyframes route-pulse { 0%,100% { opacity:.5; r:5 } 50% { opacity:1; r:7 } }
    @keyframes scroll-bob { 0%,100% { transform: translateY(0); opacity: .4 } 50% { transform: translateY(7px); opacity: 1 } }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    @keyframes node-breathe { 0%,100% { opacity:.35 } 50% { opacity:.7 } }
    @keyframes orbit-cw  { to { transform: rotate(360deg); } }
    @keyframes orbit-ccw { to { transform: rotate(-360deg); } }
    @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes draw-line { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 94%{opacity:.35} 96%{opacity:1} 97%{opacity:.5} 98%{opacity:1} }
    @keyframes sweep-fade { 0%{opacity:0} 15%{opacity:.55} 60%{opacity:0} 100%{opacity:0} }

    .anim-blink { animation: blink 1.05s step-end infinite; }
    .anim-bob   { animation: scroll-bob 1.9s ease-in-out infinite; }
    .anim-float { animation: float-y 6s ease-in-out infinite; }
    .draw-line  { transform-origin: left center; animation: draw-line 1.1s cubic-bezier(.22,.61,.36,1) .5s both; }

    /* reveal-on-scroll */
    .reveal { opacity: 0; transform: translateY(22px); transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1); }
    .reveal.in { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
      .reveal { opacity: 1 !important; transform: none !important; }
    }

    [hidden] { display: none !important; }

    /* autonomy dial */
    .dial-range { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 999px; background: #2a2418; outline: none; }
    .dial-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 18px; width: 18px; border-radius: 999px; background: #FFC24A; border: 3px solid #0A0C0F; box-shadow: 0 0 0 1px #FFC24A, 0 0 16px -2px rgba(255,194,74,0.7); cursor: pointer; }
    .dial-range::-moz-range-thumb { height: 14px; width: 14px; border-radius: 999px; background: #FFC24A; border: 3px solid #0A0C0F; box-shadow: 0 0 0 1px #FFC24A; cursor: pointer; }
    .dial-range:focus-visible { box-shadow: 0 0 0 2px rgba(255,194,74,0.5); }
  </style>
</head>
<body class="bg-ink">
  <div id="root"></div>

  <!-- React 18 + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- content + i18n (plain JS, runs before babel components) -->
  <script>window.React = window.React;</script>
  <script src="src/content.js"></script>

  <!-- shared primitives, then section components, then app -->
  <script type="text/babel" src="src/components/primitives.jsx"></script>
  <script type="text/babel" src="src/components/Nav.jsx"></script>
  <script type="text/babel" src="src/components/Hero.jsx"></script>
  <script type="text/babel" src="src/components/SystemArchitecture.jsx"></script>
  <script type="text/babel" src="src/components/LiveBuilds.jsx"></script>
  <script type="text/babel" src="src/components/MavisCapabilities.jsx"></script>
  <script type="text/babel" src="src/components/OperatingFlow.jsx"></script>
  <script type="text/babel" src="src/components/BeforeAgents.jsx"></script>
  <script type="text/babel" src="src/components/CinematicBand.jsx"></script>
  <script type="text/babel" src="src/components/Journey.jsx"></script>
  <script type="text/babel" src="src/components/Principles.jsx"></script>
  <script type="text/babel" src="src/components/BuildingInPublic.jsx"></script>
  <script type="text/babel" src="src/components/Closing.jsx"></script>
  <script type="text/babel" src="src/components/Footer.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>

  <!-- ============================================================= -->
  <!-- MAVIS voice agent — ElevenLabs Conversational AI.             -->
  <!-- Visitors talk to MAVIS (Jane's agent persona) and book calls. -->
  <!-- TO GO LIVE: set MAVIS_AGENT_ID below to your real agent id    -->
  <!--   (ElevenLabs dashboard → Conversational AI → Agents). Set    -->
  <!--   MAVIS's personality, voice, knowledge & a booking tool      -->
  <!--   there; theme colors are configured in-dashboard too.        -->
  <!-- Until then the widget stays dormant (no console errors) and   -->
  <!-- the "Talk to MAVIS" button routes visitors to booking.        -->
  <!-- ============================================================= -->
  <script>
    window.MAVIS_AGENT_ID = "REPLACE_WITH_MAVIS_AGENT_ID"; // <-- paste real agent id here
    (function () {
      var id = window.MAVIS_AGENT_ID;
      if (!id || id.indexOf("REPLACE_") === 0) {
        window.MAVIS_READY = false;
        console.info("[MAVIS] Voice agent not configured — set window.MAVIS_AGENT_ID to your ElevenLabs agent id to enable it.");
        return;
      }
      window.MAVIS_READY = true;
      var el = document.createElement("elevenlabs-convai");
      el.setAttribute("agent-id", id);
      el.setAttribute("action-text", "Talk to MAVIS");
      el.setAttribute("start-call-text", "Start conversation");
      el.setAttribute("end-call-text", "End");
      el.setAttribute("listening-text", "MAVIS is listening…");
      el.setAttribute("speaking-text", "MAVIS is speaking…");
      document.body.appendChild(el);
      var s = document.createElement("script");
      s.src = "https://unpkg.com/@elevenlabs/convai-widget-embed";
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
